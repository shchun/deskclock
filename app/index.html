<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
<title>Desk Clock</title>
<style>
  /* 오프라인 사용을 위해 폰트를 앱에 내장 (Jost/Archivo/Orbitron은 가변폰트) */
  @font-face{ font-family:'Jost'; font-style:normal; font-weight:200 500;
    src:url('fonts/jost-var.woff2') format('woff2'); font-display:swap; }
  @font-face{ font-family:'Archivo'; font-style:normal; font-weight:500 700;
    src:url('fonts/archivo-var.woff2') format('woff2'); font-display:swap; }
  @font-face{ font-family:'Orbitron'; font-style:normal; font-weight:400 700;
    src:url('fonts/orbitron-var.woff2') format('woff2'); font-display:swap; }
  @font-face{ font-family:'Anton'; font-style:normal; font-weight:400;
    src:url('fonts/anton-400.woff2') format('woff2'); font-display:swap; }
</style>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    background:#000;
    overflow:hidden;
    font-family:'Jost',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    cursor:default;
  }

  .stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
  }

  /* ---- faces ---- */
  .face{
    position:absolute; inset:0;
    display:none; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .face.active{
    display:flex; z-index:1;
    animation:faceIn .55s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes faceIn{
    from{ transform:scale(1.03); }
    to{ transform:scale(1); }
  }
  @media (prefers-reduced-motion:reduce){
    .face.active{ animation:none; }
  }

  /* ======================================================= */
  /* FACE 1 — MINIMAL / MODERN                               */
  /* ======================================================= */
  /* Brutal Minimal — 비비드 옐로우 + 흰 박스 + 하드 그림자 */
  #face1{ background:#FFED47; color:#0a0a0a; }
  .f1-wrap{ display:flex; flex-direction:column; align-items:center; gap:4.5vmin; }
  .f1-date{
    font-family:'Archivo',sans-serif; font-weight:700; font-size:2.1vmin; letter-spacing:.32em; white-space:nowrap;
    text-transform:uppercase; color:#FFED47; background:#0a0a0a; padding:.9vmin 1.8vmin;
    border:3px solid #0a0a0a; box-shadow:4px 4px 0 #0a0a0a;
  }
  .f1-clock{ display:flex; align-items:stretch; gap:2.4vmin; line-height:.8;
    background:#fff; border:4px solid #0a0a0a; box-shadow:8px 8px 0 #0a0a0a; padding:3vmin 3.6vmin; }
  .f1-time{ font-family:'Archivo',sans-serif; font-weight:700; font-size:21vmin; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .f1-side{ display:flex; flex-direction:column; align-items:stretch; justify-content:center; gap:1.4vmin; }
  .f1-sec{ font-family:'Archivo',sans-serif; font-weight:700; font-size:4.4vmin; color:#0a0a0a; font-variant-numeric:tabular-nums;
    border:3px solid #0a0a0a; padding:.3vmin 1.2vmin; text-align:center; }
  .f1-ampm{ font-family:'Archivo',sans-serif; font-weight:700; font-size:3vmin; letter-spacing:.18em; color:#FFED47; background:#0a0a0a;
    padding:.5vmin 1.2vmin; text-align:center; }
  .f1-rule{ width:34vmin; height:1.2vmin; background:#0a0a0a; }

  /* ======================================================= */
  /* FACE 2 — RETRO FLIP                                     */
  /* ======================================================= */
  /* Brutal Flip — 비비드 레드 + 각진 흰 카드 */
  #face2{ background:#FF3B3B; color:#0a0a0a; }
  .f2-wrap{ display:flex; flex-direction:column; align-items:center; gap:4.2vmin; }
  .f2-row{ display:flex; align-items:center; gap:1.6vmin; }
  .flip-group{ display:flex; gap:1.1vmin; }
  .flip-group.sec{ transform:scale(.5); transform-origin:center bottom; margin-left:.4vmin; }
  .f2-colon{ display:flex; flex-direction:column; gap:4vmin; padding:0 .3vmin; }
  .f2-colon i{ width:1.8vmin; height:1.8vmin; background:#0a0a0a; display:block; }
  .f2-colon.blink{ animation:f2blink 1s steps(1,end) infinite; }
  @keyframes f2blink{ 50%{ opacity:.25; } }

  .flip-card{
    position:relative;
    width:13vmin; height:18vmin;
    font-family:'Archivo',sans-serif; font-weight:700;
    font-size:14vmin; line-height:18vmin;
    perspective:340px;
    border:4px solid #0a0a0a;
    box-shadow:6px 6px 0 #0a0a0a;
  }
  .flip-card .half{
    position:absolute; left:0; width:100%; height:50%;
    overflow:hidden; background:#fff; color:#0a0a0a;
  }
  .flip-card .num{
    position:absolute; left:0; width:100%; height:18vmin; line-height:18vmin;
    text-align:center; font-variant-numeric:tabular-nums;
    /* 내장 가변 Archivo의 ascent가 커서 베이스라인이 낮게 잡혀 숫자 아래가 카드에
       잘리는 것을 보정 — 모든 num에 동일 적용해 분할 이음새 정렬은 유지된다. */
    transform:translateY(-2.5vmin);
  }
  .flip-card .top .num, .flip-card .top-flip .num{ top:0; }
  .flip-card .bottom .num, .flip-card .bottom-flip .num{ bottom:0; }
  .flip-card .top{ top:0;
    border-bottom:2px solid #0a0a0a; background:#fff; }
  .flip-card .bottom{ bottom:0; background:#ededed; }
  .flip-card .top-flip{ top:0; transform-origin:bottom; z-index:3;
    background:#fff;
    border-bottom:2px solid #0a0a0a; backface-visibility:hidden; }
  .flip-card .bottom-flip{ bottom:0; transform-origin:top; z-index:3;
    background:#ededed;
    transform:rotateX(90deg); backface-visibility:hidden; }
  .flip-card.flipping .top-flip{ animation:foldTop .3s ease-in forwards; }
  .flip-card.flipping .bottom-flip{ animation:unfoldBottom .3s ease-out .3s forwards; }
  @keyframes foldTop{ from{ transform:rotateX(0); } to{ transform:rotateX(-90deg); } }
  @keyframes unfoldBottom{ from{ transform:rotateX(90deg); } to{ transform:rotateX(0deg); } }

  .f2-meta{ display:flex; align-items:center; gap:2.4vmin; }
  .f2-ampm{
    font-family:'Archivo',sans-serif; font-weight:700; font-size:2.4vmin;
    letter-spacing:.2em; padding:.9vmin 1.8vmin;
    background:#0a0a0a; color:#FFED47; border:3px solid #0a0a0a; box-shadow:3px 3px 0 #0a0a0a;
  }
  .f2-date{ font-family:'Archivo',sans-serif; font-weight:700; font-size:2.2vmin; letter-spacing:.2em; white-space:nowrap;
    color:#0a0a0a; background:#fff; padding:.9vmin 1.8vmin; border:3px solid #0a0a0a; box-shadow:3px 3px 0 #0a0a0a; text-transform:uppercase; }

  /* ======================================================= */
  /* FACE 3 — TYPOGRAPHY                                     */
  /* ======================================================= */
  /* Brutal Typography — 흰 배경 + 핫핑크 하드 오프셋 */
  #face3{ background:#F5F5F5;
    background-image:repeating-linear-gradient(0deg, rgba(10,10,10,.045) 0 2px, transparent 2px 11px);
    color:#0a0a0a; }
  .f3-wrap{ position:relative; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .f3-time{
    font-family:'Anton',sans-serif; font-weight:400;
    font-size:40vmin; line-height:.82; letter-spacing:-.02em;
    font-variant-numeric:tabular-nums; text-transform:uppercase;
    color:#0a0a0a; text-shadow:7px 7px 0 #FF1F7D;
  }
  .f3-ampm{
    position:absolute; top:6%; right:6%;
    font-family:'Anton',sans-serif; font-size:7.5vmin; line-height:.9;
    color:#0a0a0a; background:#FF1F7D; padding:.4vmin 2vmin;
    border:4px solid #0a0a0a; box-shadow:6px 6px 0 #0a0a0a;
  }
  .f3-date{
    position:absolute; left:5%; bottom:6%;
    writing-mode:vertical-rl; transform:rotate(180deg);
    font-family:'Anton',sans-serif; font-size:4.4vmin; letter-spacing:.06em;
    color:#F5F5F5; background:#0a0a0a; padding:1.6vmin .7vmin;
    text-transform:uppercase;
  }
  .f3-sec{
    position:absolute; right:6%; bottom:6%;
    font-family:'Anton',sans-serif; font-size:7vmin; color:#FF1F7D;
    background:#0a0a0a; padding:.2vmin 1.4vmin;
    box-shadow:-5px 5px 0 #FF1F7D;
    font-variant-numeric:tabular-nums;
  }

  /* ======================================================= */
  /* FACE 4 — NEON / GLOW                                    */
  /* ======================================================= */
  /* Brutal Electric — 딥 네이비 + 그리드 + 라임/블루 하드 블록 */
  #face4{
    background:#0A0E1A;
    background-image:
      linear-gradient(rgba(30,100,255,.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,100,255,.12) 1px, transparent 1px);
    background-size:6vmin 6vmin;
    color:#fff;
  }
  .f4-wrap{ display:flex; flex-direction:column; align-items:center; gap:4vmin; }
  .f4-clock{ display:flex; align-items:center; gap:2vmin;
    font-family:'Orbitron',sans-serif; font-weight:700;
    background:#1E64FF; border:5px solid #C8FF00; box-shadow:9px 9px 0 #C8FF00; padding:2.4vmin 3.6vmin; }
  .f4-time{
    font-size:21vmin; letter-spacing:.01em; font-variant-numeric:tabular-nums;
    color:#C8FF00; text-shadow:4px 4px 0 #0a0a0a;
  }
  .f4-colon{ animation:f4blink 1.1s steps(1,end) infinite; }
  @keyframes f4blink{ 50%{ opacity:.28; } }
  .f4-ampm{
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:3.6vmin;
    align-self:center; color:#0a0a0a; background:#C8FF00; padding:.6vmin 1.6vmin; border:3px solid #0a0a0a;
  }
  .f4-meta{ display:flex; align-items:center; gap:2.6vmin;
    font-family:'Orbitron',sans-serif; font-weight:700; }
  .f4-sec{ font-size:3vmin; color:#C8FF00;
    border:3px solid #C8FF00; padding:.3vmin 1.2vmin; font-variant-numeric:tabular-nums; }
  .f4-dot{ width:1.4vmin; height:1.4vmin; background:#C8FF00; }
  .f4-date{ font-size:2.3vmin; letter-spacing:.2em; white-space:nowrap; color:#0A0E1A; background:#C8FF00; padding:.5vmin 1.4vmin; text-transform:uppercase; }

  /* ======================================================= */
  /* FACE 5 — MINIMAL / MODERN (classic)                     */
  /* ======================================================= */
  #face5{ background:#ECE9E1; color:#1b1a16; }
  .f5-wrap{ display:flex; flex-direction:column; align-items:center; gap:5.5vmin; }
  .f5-date{ font-weight:400; font-size:2.1vmin; letter-spacing:.55em; white-space:nowrap;
    text-transform:uppercase; color:#8c887c; padding-left:.55em; }
  .f5-clock{ display:flex; align-items:flex-start; gap:1.6vmin; line-height:.8; }
  .f5-time{ font-weight:200; font-size:24vmin; letter-spacing:-.01em; font-variant-numeric:tabular-nums; }
  .f5-side{ display:flex; flex-direction:column; align-items:flex-start; gap:1.4vmin; padding-top:3vmin; }
  .f5-sec{ font-weight:300; font-size:5.2vmin; color:#b3afa2; font-variant-numeric:tabular-nums; }
  .f5-ampm{ font-weight:400; font-size:2.6vmin; letter-spacing:.4em; color:#1b1a16; padding-left:.4em; }
  .f5-rule{ width:30vmin; height:1px; background:#cdc9bd; }

  /* ======================================================= */
  /* FACE 6 — RETRO FLIP (classic)                           */
  /* ======================================================= */
  #face6{ background:radial-gradient(120% 90% at 50% 0%, #202024 0%, #141416 55%, #0e0e10 100%); color:#f3f1ea; }
  .f6-wrap{ display:flex; flex-direction:column; align-items:center; gap:4.2vmin; }
  .f6-row{ display:flex; align-items:center; gap:1.6vmin; }
  .f6-colon{ display:flex; flex-direction:column; gap:4vmin; padding:0 .3vmin; }
  .f6-colon i{ width:1.5vmin; height:1.5vmin; border-radius:50%; background:#56565c; display:block; }
  .f6-colon.blink{ animation:f2blink 1s steps(1,end) infinite; }
  /* face6 flip 오버라이드 — 전역(브루탈리즘) .flip-card 위에 둥근/그림자 클래식 룩을 복원 */
  #face6 .flip-card{ border:none; box-shadow:none; border-radius:1.4vmin;
    filter:drop-shadow(0 1.4vmin 2.6vmin rgba(0,0,0,.45)); }
  #face6 .flip-card .half{ background:#26262b; color:#f3f1ea; }
  #face6 .flip-card .top{ border-radius:1.4vmin 1.4vmin 0 0; border-bottom:1px solid rgba(0,0,0,.45); background:#2b2b30; }
  #face6 .flip-card .bottom{ border-radius:0 0 1.4vmin 1.4vmin; background:#202024; }
  #face6 .flip-card .top-flip{ border-radius:1.4vmin 1.4vmin 0 0; background:#2b2b30; border-bottom:1px solid rgba(0,0,0,.5); }
  #face6 .flip-card .bottom-flip{ border-radius:0 0 1.4vmin 1.4vmin; background:#202024; }
  .f6-meta{ display:flex; align-items:center; gap:2.4vmin; }
  .f6-ampm{ font-family:'Archivo',sans-serif; font-weight:600; font-size:2.4vmin; letter-spacing:.25em;
    padding:.9vmin 1.8vmin; border-radius:.8vmin; background:#26262b; color:#f3b14e; box-shadow:0 .6vmin 1.4vmin rgba(0,0,0,.4); }
  .f6-date{ font-weight:400; font-size:2.2vmin; letter-spacing:.4em; white-space:nowrap; color:#9a968c; text-transform:uppercase; }

  /* ======================================================= */
  /* FACE 7 — TYPOGRAPHY (classic)                           */
  /* ======================================================= */
  #face7{ background:#E7E2D6; color:#15130d; }
  .f7-wrap{ position:relative; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .f7-time{ font-family:'Anton',sans-serif; font-weight:400; font-size:40vmin; line-height:.82; letter-spacing:-.02em;
    font-variant-numeric:tabular-nums; text-transform:uppercase; }
  .f7-ampm{ position:absolute; top:6%; right:6%; font-family:'Anton',sans-serif; font-size:9vmin; line-height:.8; color:#cf3f23; }
  .f7-date{ position:absolute; left:5%; bottom:6%; writing-mode:vertical-rl; transform:rotate(180deg);
    font-family:'Anton',sans-serif; font-size:4.4vmin; letter-spacing:.06em; color:#15130d; text-transform:uppercase; }
  .f7-sec{ position:absolute; right:6%; bottom:6%; font-family:'Anton',sans-serif; font-size:7vmin; color:#cf3f23; font-variant-numeric:tabular-nums; }

  /* ======================================================= */
  /* FACE 8 — NEON / GLOW (classic)                          */
  /* ======================================================= */
  #face8{ background:radial-gradient(120% 120% at 50% 42%, #0d1320 0%, #060810 60%, #030308 100%); color:#fff; }
  .f8-wrap{ display:flex; flex-direction:column; align-items:center; gap:4vmin; }
  .f8-clock{ display:flex; align-items:baseline; gap:1vmin; font-family:'Orbitron',sans-serif; font-weight:700; }
  .f8-time{ font-size:24vmin; letter-spacing:.01em; font-variant-numeric:tabular-nums; color:#d6fbff;
    text-shadow:0 0 .6vmin #aef6ff, 0 0 1.6vmin #4fe9ff, 0 0 4vmin #16b6ff, 0 0 8vmin #0a86e0; }
  .f8-colon{ animation:f4blink 1.1s steps(1,end) infinite; }
  .f8-ampm{ font-family:'Orbitron',sans-serif; font-weight:500; font-size:5vmin; align-self:flex-start; margin-top:2vmin;
    color:#ffd2f4; text-shadow:0 0 .6vmin #ff9be8, 0 0 2vmin #ff4fd0, 0 0 5vmin #e018b0; }
  .f8-meta{ display:flex; align-items:center; gap:2.6vmin; font-family:'Orbitron',sans-serif; font-weight:400; }
  .f8-sec{ font-size:3vmin; color:#bff0ff; text-shadow:0 0 .5vmin #7fe8ff, 0 0 2vmin #29c6ff; }
  .f8-dot{ width:1vmin; height:1vmin; border-radius:50%; background:#5fe0ff; box-shadow:0 0 1.4vmin #29c6ff; }
  .f8-date{ font-size:2.3vmin; letter-spacing:.34em; white-space:nowrap; color:#8fb6cf; text-transform:uppercase; }

  /* ======================================================= */
  /* NAV                                                     */
  /* ======================================================= */
  .stage[data-theme="light"]{ --ui:#0a0a0a; --ui-soft:rgba(10,10,10,.4); --ui-bg:rgba(255,255,255,.55); }
  .stage[data-theme="dark"]{ --ui:#FFED47; --ui-soft:rgba(255,237,71,.5); --ui-bg:rgba(10,10,10,.45); }

  .nav{
    position:fixed; left:50%; bottom:4.5vmin; transform:translateX(-50%);
    z-index:50;
    display:flex; align-items:center; gap:1.4vmin;
    padding:1.1vmin 1.6vmin;
    border:2px solid var(--ui);
    box-shadow:3px 3px 0 var(--ui);
    background:var(--ui-bg);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    transition:opacity .5s ease, color .7s ease, background .7s ease;
    color:var(--ui);
    user-select:none;
  }
  .nav button{
    appearance:none; border:none; background:transparent; color:inherit;
    width:3.4vmin; height:3.4vmin; min-width:30px; min-height:30px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:2.4vmin; line-height:1; font-family:'Archivo',sans-serif;
    transition:background .2s ease;
  }
  .nav button:hover{ background:var(--ui-bg); }
  .nav .dots{ display:flex; align-items:center; gap:1.2vmin; padding:0 .6vmin; }
  .nav .dots i{
    width:1.4vmin; height:1.4vmin; min-width:10px; min-height:10px;
    background:var(--ui-soft); cursor:pointer; transition:transform .25s ease, background .25s ease;
  }
  .nav .dots i.on{ background:var(--ui); transform:scale(1.4); }
  .nav .label{
    font-size:1.5vmin; letter-spacing:.32em; text-transform:uppercase;
    padding-left:1vmin; padding-right:.4vmin; color:var(--ui);
    min-width:13ch; text-align:left;
    font-family:'Jost',sans-serif; font-weight:400;
  }

  .stage.idle .nav{ opacity:0; pointer-events:none; }
  .nav:hover{ opacity:1 !important; }

  /* 화면 비율에 맞춘 확대는 JS(fitActive)가 담당한다 — 콘텐츠를 측정해 어떤
     비율(세로 바/가로 바/일반 폰)에서도 화면의 ~92%에 맞춰 키운다(넘치지 않게). */
</style>
</head>
<body>
  <!-- 번들 앱에서는 에셋이 이미 로컬이라 서비스워커가 불필요(오히려 stale 캐시 유발)하여 제거함.
       기존에 등록된 SW가 있으면 해제하여 옛 캐시를 정리한다. -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
      if (window.caches) caches.keys().then(ks => ks.forEach(k => caches.delete(k)));
    }
  </script>
  <div class="stage" id="stage" data-theme="light">

    <!-- FACE 1 — MINIMAL -->
    <section class="face" id="face1">
      <div class="f1-wrap">
        <div class="f1-date" id="f1-date">SUNDAY · JUNE 14</div>
        <div class="f1-clock">
          <div class="f1-time" id="f1-time">2:30</div>
          <div class="f1-side">
            <div class="f1-sec" id="f1-sec">00</div>
            <div class="f1-ampm" id="f1-ampm">PM</div>
          </div>
        </div>
        <div class="f1-rule"></div>
      </div>
    </section>

    <!-- FACE 2 — FLIP -->
    <section class="face" id="face2">
      <div class="f2-wrap">
        <div class="f2-row">
          <div class="flip-group" id="f2-h"></div>
          <div class="f2-colon blink"><i></i><i></i></div>
          <div class="flip-group" id="f2-m"></div>
          <div class="flip-group sec" id="f2-s"></div>
        </div>
        <div class="f2-meta">
          <div class="f2-ampm" id="f2-ampm">PM</div>
          <div class="f2-date" id="f2-date">SUN · JUN 14</div>
        </div>
      </div>
    </section>

    <!-- FACE 3 — TYPOGRAPHY -->
    <section class="face" id="face3">
      <div class="f3-wrap">
        <div class="f3-ampm" id="f3-ampm">PM</div>
        <div class="f3-time" id="f3-time">2:30</div>
        <div class="f3-date" id="f3-date">SUNDAY JUNE 14</div>
        <div class="f3-sec" id="f3-sec">00</div>
      </div>
    </section>

    <!-- FACE 4 — NEON -->
    <section class="face" id="face4">
      <div class="f4-wrap">
        <div class="f4-clock">
          <div class="f4-time" id="f4-time">2<span class="f4-colon">:</span>30</div>
          <div class="f4-ampm" id="f4-ampm">PM</div>
        </div>
        <div class="f4-meta">
          <div class="f4-sec" id="f4-sec">00</div>
          <div class="f4-dot"></div>
          <div class="f4-date" id="f4-date">SUNDAY · JUNE 14</div>
        </div>
      </div>
    </section>

    <!-- FACE 5 — MINIMAL (classic) -->
    <section class="face" id="face5">
      <div class="f5-wrap">
        <div class="f5-date" id="f5-date">SUNDAY · JUNE 14</div>
        <div class="f5-clock">
          <div class="f5-time" id="f5-time">2:30</div>
          <div class="f5-side">
            <div class="f5-sec" id="f5-sec">00</div>
            <div class="f5-ampm" id="f5-ampm">PM</div>
          </div>
        </div>
        <div class="f5-rule"></div>
      </div>
    </section>

    <!-- FACE 6 — FLIP (classic) -->
    <section class="face" id="face6">
      <div class="f6-wrap">
        <div class="f6-row">
          <div class="flip-group" id="f6-h"></div>
          <div class="f6-colon blink"><i></i><i></i></div>
          <div class="flip-group" id="f6-m"></div>
          <div class="flip-group sec" id="f6-s"></div>
        </div>
        <div class="f6-meta">
          <div class="f6-ampm" id="f6-ampm">PM</div>
          <div class="f6-date" id="f6-date">SUN · JUN 14</div>
        </div>
      </div>
    </section>

    <!-- FACE 7 — TYPOGRAPHY (classic) -->
    <section class="face" id="face7">
      <div class="f7-wrap">
        <div class="f7-ampm" id="f7-ampm">PM</div>
        <div class="f7-time" id="f7-time">2:30</div>
        <div class="f7-date" id="f7-date">SUNDAY JUNE 14</div>
        <div class="f7-sec" id="f7-sec">00</div>
      </div>
    </section>

    <!-- FACE 8 — NEON (classic) -->
    <section class="face" id="face8">
      <div class="f8-wrap">
        <div class="f8-clock">
          <div class="f8-time" id="f8-time">2<span class="f8-colon">:</span>30</div>
          <div class="f8-ampm" id="f8-ampm">PM</div>
        </div>
        <div class="f8-meta">
          <div class="f8-sec" id="f8-sec">00</div>
          <div class="f8-dot"></div>
          <div class="f8-date" id="f8-date">SUNDAY · JUNE 14</div>
        </div>
      </div>
    </section>

  </div>

  <!-- NAV (위치 표시용 점만 — 화면을 터치하면 다음 시계로 전환) -->
  <nav class="nav" id="nav">
    <div class="dots" id="dots"></div>
  </nav>

<script>
(function(){
  const FACES = [
    { id:'face1', name:'Brutal Minimal',  theme:'light' },
    { id:'face2', name:'Brutal Flip',     theme:'dark'  },
    { id:'face3', name:'Brutal Type',     theme:'light' },
    { id:'face4', name:'Brutal Electric', theme:'dark'  },
    { id:'face5', name:'Minimal',         theme:'light' },
    { id:'face6', name:'Retro Flip',      theme:'dark'  },
    { id:'face7', name:'Typography',      theme:'light' },
    { id:'face8', name:'Neon',            theme:'dark'  },
  ];

  const stage = document.getElementById('stage');
  const nav   = document.getElementById('nav');
  const dotsC = document.getElementById('dots');

  // build dots
  FACES.forEach((f,i)=>{
    const d=document.createElement('i');
    d.addEventListener('click',()=>go(i));
    dotsC.appendChild(d);
  });
  const dots=[...dotsC.children];

  let active = parseInt(localStorage.getItem('deskclock.face')||'0',10);
  if(isNaN(active)||active<0||active>=FACES.length) active=0;

  function go(i){
    active=(i+FACES.length)%FACES.length;
    FACES.forEach((f,idx)=>{
      document.getElementById(f.id).classList.toggle('active', idx===active);
      dots[idx].classList.toggle('on', idx===active);
    });
    stage.dataset.theme = FACES[active].theme;
    localStorage.setItem('deskclock.face', active);
    if(FACES[active].id==='face2'||FACES[active].id==='face6') renderFlip(false); // set instantly, no animation
    fitActive();
    setTimeout(fitActive, 600); // 진입 애니메이션이 끝난 뒤 정확히 다시 맞춤
  }

  /* ---------- 화면 비율에 맞춰 콘텐츠 자동 확대 ----------
     vmin(짧은 변) 기준이라 세로/가로로 길쭉한 화면(폴드 커버 등)에서 작게 보이는
     것을 보정. 콘텐츠 실측 크기로 배율을 계산하므로 어떤 비율에서도 넘치지 않는다. */
  function fitEl(el, availW, availH, maxS){
    const cur = +(el.dataset.fit || 1);
    const r = el.getBoundingClientRect();
    const natW = r.width/cur, natH = r.height/cur;
    if(!natW || !natH) return;
    let s = Math.min(availW/natW, availH/natH);
    s = Math.max(0.4, Math.min(maxS, s));
    el.dataset.fit = s;
    el.style.transform = 'scale('+s+')';
  }
  function fitActive(){
    const id = FACES[active].id;
    const vw = window.innerWidth, vh = window.innerHeight;
    if(id==='face3'||id==='face7'){
      // 타이포: 중앙 시간만 맞춤(모서리 라벨은 vmin 기준 그대로 둠)
      // 시간의 세로 크기를 제한해 위/아래 모서리 라벨(AM·초·날짜)과 겹치지 않게 한다
      const t = document.getElementById(id.replace('face','f')+'-time');
      if(t) fitEl(t, vw*0.9, vh*0.6, 5);
    }else{
      const w = document.querySelector('#'+id+' .'+id.replace('face','f')+'-wrap');
      if(w) fitEl(w, vw*0.92, vh*0.92, 4);
    }
  }
  let lastHlen = 0;
  window.addEventListener('resize', fitActive);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(fitActive);

  // 시계 화면을 터치(클릭)하면 다음 시계로 전환
  stage.addEventListener('click',()=>go(active+1));
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')  go(active-1);
    if(e.key==='ArrowRight') go(active+1);
  });

  /* ---------- idle hide of nav ---------- */
  let idleT;
  function wake(){
    stage.classList.remove('idle');
    clearTimeout(idleT);
    idleT=setTimeout(()=>stage.classList.add('idle'), 4000);
  }
  ['mousemove','touchstart','keydown'].forEach(ev=>window.addEventListener(ev,wake,{passive:true}));
  wake();

  /* ---------- flip clock ---------- */
  function buildFlip(container,count){
    container.innerHTML='';
    const cards=[];
    for(let i=0;i<count;i++){
      const c=document.createElement('div');
      c.className='flip-card';
      c.dataset.value='';
      c.innerHTML=
        '<div class="half top"><div class="num"></div></div>'+
        '<div class="half bottom"><div class="num"></div></div>'+
        '<div class="half top-flip"><div class="num"></div></div>'+
        '<div class="half bottom-flip"><div class="num"></div></div>';
      c.addEventListener('animationend',e=>{
        if(e.animationName==='unfoldBottom'){
          c.querySelector('.bottom .num').textContent=c.dataset.value;
          c.querySelector('.top-flip .num').textContent=c.dataset.value;
          c.classList.remove('flipping');
        }
      });
      container.appendChild(c);
      cards.push(c);
    }
    return cards;
  }
  function setCard(card,val,animate){
    val=String(val);
    if(card.dataset.value===val) return;
    if(!animate){
      card.dataset.value=val;
      card.querySelectorAll('.num').forEach(n=>n.textContent=val);
      card.classList.remove('flipping');
      return;
    }
    const cur=card.dataset.value;
    card.querySelector('.top .num').textContent=val;
    card.querySelector('.bottom-flip .num').textContent=val;
    card.querySelector('.top-flip .num').textContent=cur;
    card.querySelector('.bottom .num').textContent=cur;
    card.dataset.value=val;
    card.classList.remove('flipping'); void card.offsetWidth; card.classList.add('flipping');
  }
  function setGroup(cards,str,animate){
    str=String(str);
    for(let i=0;i<cards.length;i++) setCard(cards[i], str[i], animate);
  }
  const hCards=buildFlip(document.getElementById('f2-h'),2);
  const mCards=buildFlip(document.getElementById('f2-m'),2);
  const sCards=buildFlip(document.getElementById('f2-s'),2);
  const hCards6=buildFlip(document.getElementById('f6-h'),2);
  const mCards6=buildFlip(document.getElementById('f6-m'),2);
  const sCards6=buildFlip(document.getElementById('f6-s'),2);

  /* ---------- ticking ---------- */
  const DAYS=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const DAYS3=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MON=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const MON3=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const pad=n=>String(n).padStart(2,'0');

  const el=id=>document.getElementById(id);
  const f1t=el('f1-time'),f1s=el('f1-sec'),f1a=el('f1-ampm'),f1d=el('f1-date');
  const f2a=el('f2-ampm'),f2d=el('f2-date');
  const f3t=el('f3-time'),f3a=el('f3-ampm'),f3d=el('f3-date'),f3s=el('f3-sec');
  const f4t=el('f4-time'),f4a=el('f4-ampm'),f4s=el('f4-sec'),f4d=el('f4-date');
  const f5t=el('f5-time'),f5s=el('f5-sec'),f5a=el('f5-ampm'),f5d=el('f5-date');
  const f6a=el('f6-ampm'),f6d=el('f6-date');
  const f7t=el('f7-time'),f7a=el('f7-ampm'),f7d=el('f7-date'),f7s=el('f7-sec');
  const f8t=el('f8-time'),f8a=el('f8-ampm'),f8s=el('f8-sec'),f8d=el('f8-date');

  let cur={h:'',m:'',s:''};

  // force===false 면 무조건 즉시(애니메이션 없이) 세팅. 그 외엔 활성 플립 페이스만 애니메이션.
  function renderFlip(force){
    const inst = force===false;
    const a2 = !inst && active===1;
    setGroup(hCards,cur.h,a2); setGroup(mCards,cur.m,a2); setGroup(sCards,cur.s,a2);
    const a6 = !inst && active===5;
    setGroup(hCards6,cur.h,a6); setGroup(mCards6,cur.m,a6); setGroup(sCards6,cur.s,a6);
  }

  function tick(){
    const d=new Date();
    let h=d.getHours(); const m=d.getMinutes(); const s=d.getSeconds();
    const ampm=h>=12?'PM':'AM'; const h12=h%12||12;
    const hh=pad(h12),mm=pad(m),ss=pad(s);
    cur={h:hh,m:mm,s:ss};

    const dayL=DAYS[d.getDay()], day3=DAYS3[d.getDay()];
    const monL=MON[d.getMonth()], mon3=MON3[d.getMonth()];
    const dn=d.getDate();

    // face 1
    f1t.textContent=h12+':'+mm; f1s.textContent=ss; f1a.textContent=ampm;
    f1d.textContent=dayL+' · '+monL+' '+dn;
    // face 2
    f2a.textContent=ampm; f2d.textContent=day3+' · '+mon3+' '+dn;
    renderFlip();
    // face 3
    f3t.textContent=h12+':'+mm; f3a.textContent=ampm; f3s.textContent=ss;
    f3d.textContent=dayL+'  '+mon3+' '+dn;
    // face 4
    f4t.innerHTML=h12+'<span class="f4-colon">:</span>'+mm;
    f4a.textContent=ampm; f4s.textContent=ss;
    f4d.textContent=dayL+' · '+monL+' '+dn;
    // face 5 (classic minimal)
    f5t.textContent=h12+':'+mm; f5s.textContent=ss; f5a.textContent=ampm;
    f5d.textContent=dayL+' · '+monL+' '+dn;
    // face 6 (classic flip) — flip 카드는 renderFlip()에서 함께 갱신
    f6a.textContent=ampm; f6d.textContent=day3+' · '+mon3+' '+dn;
    // face 7 (classic typography)
    f7t.textContent=h12+':'+mm; f7a.textContent=ampm; f7s.textContent=ss;
    f7d.textContent=dayL+'  '+mon3+' '+dn;
    // face 8 (classic neon)
    f8t.innerHTML=h12+'<span class="f8-colon">:</span>'+mm;
    f8a.textContent=ampm; f8s.textContent=ss;
    f8d.textContent=dayL+' · '+monL+' '+dn;

    // 시 자릿수(예: 9→10, 12→1)가 바뀌면 시간 폭이 달라지므로 다시 맞춤
    const hlen = String(h12).length;
    if(hlen !== lastHlen){ lastHlen = hlen; fitActive(); }
  }

  // init
  go(active);
  tick();
  renderFlip(false);
  fitActive();
  // align to second boundary, then tick each second
  function loop(){ tick(); setTimeout(loop, 1000 - (Date.now()%1000)); }
  setTimeout(loop, 1000 - (Date.now()%1000));
})();
</script>
</body>
</html>
